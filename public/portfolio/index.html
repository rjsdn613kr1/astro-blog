<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>30년 포트폴리오 백테스트 대시보드</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #f4efe7;
      --paper: #fffaf2;
      --ink: #1f2937;
      --muted: #5f6b7a;
      --line: #d8cfc2;
      --accent: #0f766e;
      --accent-2: #b45309;
      --accent-3: #1d4ed8;
      --accent-4: #7c2d12;
      --shadow: 0 18px 40px rgba(84, 59, 27, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard Variable", "SUIT Variable", "Apple SD Gothic Neo", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 24%),
        radial-gradient(circle at top right, rgba(180, 83, 9, 0.13), transparent 22%),
        linear-gradient(180deg, #f7f2ea 0%, #efe7dc 100%);
    }

    .wrap {
      max-width: 1360px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .hero {
      background: linear-gradient(145deg, rgba(255,250,242,0.96), rgba(250,244,235,0.94));
      border: 1px solid rgba(216, 207, 194, 0.85);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero p, .method li, .notes li {
      color: var(--muted);
      line-height: 1.6;
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: 330px 1fr;
      align-items: start;
    }

    .panel {
      background: rgba(255, 250, 242, 0.9);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .controls label,
    .controls .section-title {
      display: block;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    select, input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #ccbda8;
      background: #fffdf8;
      font-size: 15px;
      color: var(--ink);
      margin-bottom: 16px;
    }

    .stat-cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat {
      padding: 16px;
      border-radius: 20px;
      background: linear-gradient(160deg, #fffdf8, #f7efe3);
      border: 1px solid var(--line);
    }

    .stat .label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .stat .value {
      font-size: clamp(20px, 2vw, 30px);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .chart-card {
      padding: 12px 12px 6px;
      border-radius: 24px;
      background: rgba(255, 252, 247, 0.88);
      border: 1px solid var(--line);
      margin-bottom: 16px;
    }

    .chart {
      min-height: 420px;
    }

    .chart.small {
      min-height: 320px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255, 251, 245, 0.84);
      border-radius: 16px;
      overflow: hidden;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #eadfce;
      text-align: right;
      font-size: 14px;
    }

    th:first-child, td:first-child {
      text-align: left;
    }

    .subgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.1);
      color: var(--accent);
      font-weight: 600;
      margin: 4px 6px 0 0;
      font-size: 13px;
    }

    .warning {
      border-left: 4px solid var(--accent-2);
      padding-left: 12px;
      margin-top: 12px;
      color: var(--muted);
    }

    .notes, .method {
      padding-left: 18px;
      margin: 10px 0 0;
    }

    @media (max-width: 980px) {
      .grid, .subgrid, .stat-cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>실제 데이터 기반 30년 포트폴리오 비교</h1>
      <p id="hero-meta"></p>
      <div id="proxy-pills"></div>
      <div class="warning">
        NH농협은행의 30년치 월별 평균 예금·적금 금리 공개 시계열은 확보가 어려워, 예금/적금은 한국의 실제 예금금리 공공 통계를 프록시로 사용합니다.
      </div>
    </section>

    <div class="grid">
      <aside class="panel controls">
        <div class="section-title">비교 설정</div>
        <label for="scenario">시나리오</label>
        <select id="scenario">
          <option value="lump_sum">일시금 투자</option>
          <option value="monthly">월 적립 투자</option>
        </select>

        <label for="rebalance">리밸런싱</label>
        <select id="rebalance">
          <option value="none">리밸런싱 없음</option>
          <option value="annual">연 1회</option>
          <option value="quarterly">분기 1회</option>
          <option value="threshold">2.5% 초과</option>
        </select>

        <label for="initialCapital">초기금액 (원)</label>
        <input id="initialCapital" type="number" step="100000" value="10000000" />

        <label for="monthlyContribution">월 납입금 (원)</label>
        <input id="monthlyContribution" type="number" step="10000" value="500000" />

        <div class="section-title">프록시 시작일</div>
        <div id="inception-list"></div>

        <div class="section-title">30년 전에 없던 ETF</div>
        <p class="warning">
          GLD는 2004-11-18, DBC는 2006-02-06, IEF/TLT는 2002-07-30에 시작했습니다.
          이번 대시보드는 더 긴 실제 프록시 시계열로 백필했습니다.
        </p>
      </aside>

      <main>
        <div class="stat-cards" id="stats"></div>

        <div class="chart-card">
          <div id="equityChart" class="chart"></div>
        </div>

        <div class="chart-card">
          <div id="drawdownChart" class="chart small"></div>
        </div>

        <div class="panel">
          <h3>성과 요약</h3>
          <div id="metricsTable"></div>
        </div>

        <div class="subgrid">
          <div class="panel">
            <h3>방법론</h3>
            <ul class="method" id="method-list"></ul>
          </div>
          <div class="panel">
            <h3>데이터 소스</h3>
            <ul class="notes" id="source-list"></ul>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const COLORS = {
      permanent_portfolio: "#0f766e",
      all_weather: "#b45309",
      sp500: "#1d4ed8",
      deposit: "#7c2d12",
      savings: "#9333ea"
    };

    async function loadData() {
      if (window.__BACKTEST_DATA__) {
        return window.__BACKTEST_DATA__;
      }
      const response = await fetch("../data/portfolio_backtest_data.json");
      return response.json();
    }

    function formatKRW(value) {
      return new Intl.NumberFormat("ko-KR", { maximumFractionDigits: 0 }).format(Math.round(value)) + "원";
    }

    function formatPct(value, digits = 2) {
      return (value * 100).toFixed(digits) + "%";
    }

    function annualizedReturnFromPath(values, years, contributions) {
      const invested = contributions;
      if (invested <= 0 || values.length === 0) return null;
      const ending = values[values.length - 1];
      return Math.pow(ending / invested, 1 / years) - 1;
    }

    function computeIRR(cashflows) {
      let guess = 0.01;
      for (let i = 0; i < 100; i += 1) {
        let npv = 0;
        let derivative = 0;
        for (let t = 0; t < cashflows.length; t += 1) {
          const denom = Math.pow(1 + guess, t);
          npv += cashflows[t] / denom;
          if (t > 0) derivative += (-t * cashflows[t]) / (denom * (1 + guess));
        }
        if (Math.abs(derivative) < 1e-12) break;
        const next = guess - npv / derivative;
        if (!Number.isFinite(next)) break;
        if (Math.abs(next - guess) < 1e-10) {
          guess = next;
          break;
        }
        guess = next;
      }
      return Math.pow(1 + guess, 12) - 1;
    }

    function simulateSeries(returns, initialCapital, monthlyContribution, scenario) {
      const values = [];
      let balance = initialCapital;
      for (let i = 0; i < returns.length; i += 1) {
        if (scenario === "monthly") {
          balance += monthlyContribution;
        }
        balance *= (1 + returns[i]);
        values.push(balance);
      }
      return values;
    }

    function computeDrawdown(values) {
      let peak = values[0] || 0;
      return values.map((value) => {
        peak = Math.max(peak, value);
        return peak === 0 ? 0 : value / peak - 1;
      });
    }

    function metricsFromValues(values, returns, scenario, initialCapital, monthlyContribution) {
      const ending = values[values.length - 1];
      const years = values.length / 12;
      const totalContribution = scenario === "monthly"
        ? initialCapital + monthlyContribution * values.length
        : initialCapital;
      const profit = ending - totalContribution;
      const drawdown = Math.min(...computeDrawdown(values));
      const volatility = Math.sqrt(12) * stddev(returns);

      let annualized;
      if (scenario === "monthly") {
        const cashflows = [-initialCapital];
        for (let i = 0; i < values.length; i += 1) {
          cashflows.push(-monthlyContribution);
        }
        cashflows[cashflows.length - 1] += ending;
        annualized = computeIRR(cashflows);
      } else {
        annualized = Math.pow(ending / initialCapital, 1 / years) - 1;
      }

      return {
        ending,
        totalContribution,
        profit,
        annualized,
        drawdown,
        volatility
      };
    }

    function stddev(arr) {
      const mean = arr.reduce((a, b) => a + b, 0) / arr.length;
      const variance = arr.reduce((sum, v) => sum + Math.pow(v - mean, 2), 0) / arr.length;
      return Math.sqrt(variance);
    }

    function scenarioStrategies(data, scenario, rebalance) {
      const base = [
        { key: "permanent_portfolio", name: data.portfolios.permanent_portfolio.name, returns: data.series.portfolio_returns.permanent_portfolio[rebalance] },
        { key: "all_weather", name: data.portfolios.all_weather.name, returns: data.series.portfolio_returns.all_weather[rebalance] },
        { key: "sp500", name: data.portfolios.sp500.name, returns: data.series.portfolio_returns.sp500[rebalance] }
      ];

      if (scenario === "lump_sum") {
        base.push({ key: "deposit", name: "예금(1년 반복)", returns: data.series.deposit_returns });
      } else {
        base.push({ key: "savings", name: "적금", returns: data.series.savings_returns });
      }
      return base;
    }

    function renderCards(best) {
      const el = document.getElementById("stats");
      el.innerHTML = `
        <div class="stat">
          <div class="label">최종 1위</div>
          <div class="value">${best.name}</div>
        </div>
        <div class="stat">
          <div class="label">최종 평가액</div>
          <div class="value">${formatKRW(best.metrics.ending)}</div>
        </div>
        <div class="stat">
          <div class="label">연환산 수익률</div>
          <div class="value">${formatPct(best.metrics.annualized)}</div>
        </div>
        <div class="stat">
          <div class="label">최대 낙폭</div>
          <div class="value">${formatPct(best.metrics.drawdown)}</div>
        </div>
      `;
    }

    function renderTable(rows, scenario) {
      const headers = scenario === "monthly"
        ? ["전략", "최종 평가액", "총 납입액", "손익", "연환산 IRR", "최대 낙폭"]
        : ["전략", "최종 평가액", "총 투자금", "손익", "CAGR", "최대 낙폭"];

      let html = "<table><thead><tr>" + headers.map((h) => `<th>${h}</th>`).join("") + "</tr></thead><tbody>";
      rows.forEach((row) => {
        html += `
          <tr>
            <td>${row.name}</td>
            <td>${formatKRW(row.metrics.ending)}</td>
            <td>${formatKRW(row.metrics.totalContribution)}</td>
            <td>${formatKRW(row.metrics.profit)}</td>
            <td>${formatPct(row.metrics.annualized)}</td>
            <td>${formatPct(row.metrics.drawdown)}</td>
          </tr>
        `;
      });
      html += "</tbody></table>";
      document.getElementById("metricsTable").innerHTML = html;
    }

    function renderCharts(data, rows) {
      const dates = data.series.dates;
      Plotly.newPlot("equityChart", rows.map((row) => ({
        x: dates,
        y: row.values,
        mode: "lines",
        name: row.name,
        line: { width: 3, color: COLORS[row.key] }
      })), {
        title: "누적 자산곡선",
        paper_bgcolor: "rgba(0,0,0,0)",
        plot_bgcolor: "rgba(0,0,0,0)",
        margin: { l: 50, r: 20, t: 50, b: 40 },
        legend: { orientation: "h", y: -0.15 },
        yaxis: { tickformat: ",.0f" },
        xaxis: { showgrid: false }
      }, { responsive: true });

      Plotly.newPlot("drawdownChart", rows.map((row) => ({
        x: dates,
        y: row.drawdowns,
        mode: "lines",
        name: row.name,
        line: { width: 2.5, color: COLORS[row.key] }
      })), {
        title: "낙폭 비교",
        paper_bgcolor: "rgba(0,0,0,0)",
        plot_bgcolor: "rgba(0,0,0,0)",
        margin: { l: 50, r: 20, t: 50, b: 40 },
        legend: { orientation: "h", y: -0.2 },
        yaxis: { tickformat: ".0%" },
        xaxis: { showgrid: false }
      }, { responsive: true });
    }

    function renderMeta(data) {
      document.getElementById("hero-meta").textContent =
        `${data.meta.window_label} 기준, 실제 공개 데이터 프록시로 영구 포트폴리오·올웨더·S&P500·예금·적금을 비교합니다.`;

      const pills = document.getElementById("proxy-pills");
      pills.innerHTML = `
        <span class="pill">영구: 주식·장기채·현금·금</span>
        <span class="pill">올웨더: 주식·장기채·중기채·금·원자재</span>
        <span class="pill">예금: 1년 만기 반복</span>
        <span class="pill">적금: 월 납입 시나리오 비교</span>
      `;

      const inception = document.getElementById("inception-list");
      inception.innerHTML = Object.entries(data.meta.asset_inceptions)
        .map(([key, value]) => `<div class="pill">${key}: ${value}</div>`)
        .join("");

      document.getElementById("method-list").innerHTML = data.meta.notes
        .map((note) => `<li>${note}</li>`)
        .join("");

      document.getElementById("source-list").innerHTML = data.meta.sources
        .map((source) => `<li><a href="${source.url}" target="_blank" rel="noreferrer">${source.name}</a></li>`)
        .join("");
    }

    function update(data) {
      const scenario = document.getElementById("scenario").value;
      const rebalance = document.getElementById("rebalance").value;
      const initialCapital = Number(document.getElementById("initialCapital").value || 0);
      const monthlyContribution = Number(document.getElementById("monthlyContribution").value || 0);

      const rows = scenarioStrategies(data, scenario, rebalance).map((item) => {
        const values = simulateSeries(item.returns, initialCapital, monthlyContribution, scenario);
        return {
          ...item,
          values,
          drawdowns: computeDrawdown(values),
          metrics: metricsFromValues(values, item.returns, scenario, initialCapital, monthlyContribution)
        };
      }).sort((a, b) => b.metrics.ending - a.metrics.ending);

      renderCards(rows[0]);
      renderTable(rows, scenario);
      renderCharts(data, rows);
    }

    loadData().then((data) => {
      renderMeta(data);
      update(data);
      ["scenario", "rebalance", "initialCapital", "monthlyContribution"].forEach((id) => {
        document.getElementById(id).addEventListener("input", () => update(data));
      });
      document.getElementById("rebalance").addEventListener("change", () => update(data));
      document.getElementById("scenario").addEventListener("change", () => update(data));
    });
  </script>
</body>
</html>
